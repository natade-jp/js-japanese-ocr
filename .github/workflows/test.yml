name: Test

on: [push, pull_request]

jobs:
    test:
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
            - name: Install dependencies
              run: npm ci
            - name: Run unit tests
              run: npm run test:unit
